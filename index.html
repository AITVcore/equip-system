<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備管理系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 25px; box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; font-size: 14px; }
        input[type="email"], input[type="text"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .hidden { display: none; }
        .btn { background-color: #06C755; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background-color 0.3s; }
        .btn:hover:not(:disabled) { background-color: #05a044; }
        .btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        #loading { text-align: center; color: #666; font-size: 14px; margin-top: 10px; }
        .warning-text { color: #e74c3c; font-size: 13px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>設備借用與報修</h2>
    <div id="loading">正在載入最新設備清單...</div>
    
    <form id="equipForm" class="hidden">
        <div class="form-group">
            <label for="userEmail">員工 E-Mail</label>
            <input type="email" id="userEmail" required placeholder="yourname@company.com">
        </div>

        <div class="form-group">
            <label for="action">動作</label>
            <select id="action" required>
                <option value="借用">借用設備</option>
                <option value="申請歸還">申請歸還</option>
                <option value="二次加簽">二次加簽確認</option>
                <option value="報修">設備報修</option>
                <option value="送修">送修 (維修中)</option>
                <option value="維修取回">維修取回</option>
            </select>
        </div>

        <div class="form-group">
            <label for="categorySelect">第一步：選擇設備類別</label>
            <select id="categorySelect" required>
                <option value="">-- 請選擇類別 --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="equipSelect">第二步：選擇特定設備</label>
            <select id="equipSelect" required disabled>
                <option value="">-- 請先選擇類別 --</option>
            </select>
            <div id="statusWarning" class="warning-text hidden"></div>
        </div>

        <div class="form-group" id="periodGroup">
            <label for="period">借用週期</label>
            <select id="period">
                <option value="短期">短期 (14天自動催還)</option>
                <option value="長期">長期 (每月25號定期盤點)</option>
            </select>
        </div>

        <div class="form-group" id="statusGroup">
            <label for="currentStatus">當前狀態</label>
            <select id="currentStatus">
                <option value="在借用人手上">在借用人手上</option>
                <option value="外借">外借</option>
            </select>
        </div>

        <div class="form-group" id="locationGroup">
            <label for="currentLocation">當前位置</label>
            <select id="currentLocation">
                <option value="AITg">AITg</option>
                <option value="MPS">MPS</option>
            </select>
        </div>

        <div class="form-group hidden" id="cosignerGroup">
            <label id="cosignerLabel" for="cosigner">加簽人/覆核人 E-Mail (必填)</label>
            <input type="email" id="cosigner" placeholder="請輸入加簽或覆核人員的 E-Mail">
        </div>

        <div class="form-group hidden" id="passwordGroup">
            <label for="adminPassword">二次加簽授權密碼 (必填)</label>
            <input type="password" id="adminPassword" placeholder="請加簽人員輸入授權驗證碼">
            <div id="passwordError" class="warning-text hidden">⚠️ 授權密碼錯誤，無法送出！</div>
        </div>

        <div class="form-group hidden" id="notifyGroup">
            <label for="notifyEmails" id="notifyLabel">通知人員 E-Mail (必填)</label>
            <input type="email" multiple id="notifyEmails" placeholder="多人請用英文逗號(,)隔開">
        </div>

        <div class="form-group" id="reasonGroup">
            <label for="reason" id="reasonLabel">備註 (選填)</label>
            <input type="text" id="reason" placeholder="有什麼需要特別說明的嗎？(選填)">
        </div>

        <button type="submit" class="btn" id="submitBtn">送出資料</button>
        <div id="submitLoading" style="display:none; text-align:center; color:#666; margin-top:10px;">資料傳送中...</div>
    </form>
</div>

<script>
    // === ⚠️ 請置換為你最新的 GAS 網頁應用程式網址 ===
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx4sP7kSy1FhIQFLKFSojObQcYja6fmyIsnr6tMBPnkFMqEdqpTlhne51OEohh1--M2Hw/exec"; 

    let allRawData = [];
    const form = document.getElementById('equipForm');
    const loadingText = document.getElementById('loading');
    const categorySelect = document.getElementById('categorySelect');
    const equipSelect = document.getElementById('equipSelect');
    const actionSelect = document.getElementById('action');
    const periodGroup = document.getElementById('periodGroup');     
    const periodSelect = document.getElementById('period');         
    const statusGroup = document.getElementById('statusGroup');
    const currentStatusSelect = document.getElementById('currentStatus');
    const locationGroup = document.getElementById('locationGroup');
    const cosignerGroup = document.getElementById('cosignerGroup'); 
    const cosignerLabel = document.getElementById('cosignerLabel'); 
    const cosignerInput = document.getElementById('cosigner');     
    const passwordGroup = document.getElementById('passwordGroup'); 
    const passwordInput = document.getElementById('adminPassword');
    const passwordError = document.getElementById('passwordError');
    const notifyGroup = document.getElementById('notifyGroup');     
    const notifyLabel = document.getElementById('notifyLabel');     
    const notifyEmailsInput = document.getElementById('notifyEmails'); 
    const reasonLabel = document.getElementById('reasonLabel');
    const reasonInput = document.getElementById('reason');
    const userEmailInput = document.getElementById('userEmail');
    const statusWarning = document.getElementById('statusWarning');
    const submitBtn = document.getElementById('submitBtn');

    window.onload = function() {
        const savedEmail = localStorage.getItem('savedEmail');
        if (savedEmail) {
            userEmailInput.value = savedEmail;
        }

        fetch(GAS_URL)
        .then(response => response.json())
        .then(data => {
            allRawData = data;
            loadingText.classList.add('hidden');
            form.classList.remove('hidden');
            
            // ★ 關鍵修復：主動觸發一次動作切換事件，讓預設的「借用設備」對應的加簽人欄位瞬間解除隱藏！
            actionSelect.dispatchEvent(new Event('change'));
            
            renderCategories(); 
        })
        .catch(err => {
            loadingText.textContent = "載入設備清單失敗，請重新整理網頁。";
            console.error(err);
        });
    };

    function getEligibleEquips() {
        const action = actionSelect.value;
        const email = userEmailInput.value.trim().toLowerCase();

        return allRawData.filter(item => {
            if (action === '借用') return item.status === '在庫';
            if (action === '申請歸還') return item.status === '借出中' && item.cStatus !== '待簽核' && item.borrower.toLowerCase() === email;
            if (action === '二次加簽') return item.status === '申請中' || item.cStatus === '待簽核';
            if (action === '報修') return item.status !== '待維修' && item.status !== '維修中';
            if (action === '送修') return item.status === '待維修' || item.status === '在庫' || item.status === ''; 
            if (action === '維修取回') return item.status === '維修中' || item.status === '待維修';
            return false;
        });
    }

    function renderCategories() {
        const eligibleItems = getEligibleEquips();
        const catCounts = {};
        
        eligibleItems.forEach(item => {
            catCounts[item.category] = (catCounts[item.category] || 0) + 1;
        });

        categorySelect.innerHTML = '<option value="">-- 請選擇類別 --</option>';
        Object.keys(catCounts).forEach(cat => {
            let opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = `${cat} (可用數量: ${catCounts[cat]})`;
            categorySelect.appendChild(opt);
        });

        equipSelect.innerHTML = '<option value="">-- 請先選擇類別 --</option>';
        equipSelect.disabled = true;
        validateFormSubmitState(); 
    }

    function renderEquips() {
        const selectedCat = categorySelect.value;
        equipSelect.innerHTML = '<option value="">-- 請選擇設備 --</option>';
        
        if (!selectedCat) {
            equipSelect.disabled = true;
            validateFormSubmitState();
            return;
        }

        const eligibleItems = getEligibleEquips().filter(item => item.category === selectedCat);

        eligibleItems.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.id;
            if (actionSelect.value === '二次加簽') {
                const typeText = (item.status === '申請中') ? '【借用申請】' : '【歸還申請】';
                opt.textContent = `${typeText} ${item.name} ${item.id}`;
            } else {
                opt.textContent = `${item.name} ${item.id}`; 
            }
            equipSelect.appendChild(opt);
        });

        equipSelect.disabled = false;
        validateFormSubmitState();
    }

    function validateFormSubmitState() {
        statusWarning.classList.add('hidden');
        submitBtn.disabled = !equipSelect.value;
    }

    function checkBorrowStatus() {
        if (actionSelect.value === '借用') {
            if (currentStatusSelect.value === '外借') {
                reasonLabel.textContent = '備註 - 外借對象 (必填)';
                reasonInput.placeholder = '請輸入外借對象單位/姓名...';
                reasonInput.required = true;
            } else {
                reasonLabel.textContent = '備註 (選填)';
                reasonInput.placeholder = '有什麼需要特別說明的嗎？(選填)';
                reasonInput.required = false;
            }
        }
    }

    currentStatusSelect.addEventListener('change', checkBorrowStatus);
    userEmailInput.addEventListener('blur', renderCategories);
    categorySelect.addEventListener('change', renderEquips);

    actionSelect.addEventListener('change', function() {
        cosignerGroup.classList.add('hidden');
        cosignerInput.required = false;
        passwordGroup.classList.add('hidden');
        passwordInput.required = false;
        passwordError.classList.add('hidden');
        notifyGroup.classList.add('hidden'); 
        notifyEmailsInput.required = false;
        periodGroup.classList.add('hidden'); 

        if (this.value === '借用') {
            periodGroup.classList.remove('hidden'); 
            statusGroup.classList.remove('hidden');
            locationGroup.classList.remove('hidden');
            
            // 開啟加簽人欄位 (必填)
            cosignerGroup.classList.remove('hidden'); 
            cosignerLabel.textContent = '加簽人 E-Mail (必填)';
            cosignerInput.required = true;

            checkBorrowStatus(); 
        } 
        else if (this.value === '申請歸還') {
            statusGroup.classList.add('hidden');
            locationGroup.classList.remove('hidden'); 
            
            cosignerGroup.classList.remove('hidden'); 
            cosignerLabel.textContent = '點收同仁/加簽人 E-Mail (必填)';
            cosignerInput.required = true;            
            
            reasonLabel.textContent = '備註 (選填)';
            reasonInput.placeholder = '有什麼需要特別說明的嗎？(選填)';
            reasonInput.required = false;
        } 
        else if (this.value === '二次加簽') {
            statusGroup.classList.add('hidden');
            locationGroup.classList.remove('hidden'); 
            
            cosignerGroup.classList.remove('hidden'); 
            cosignerLabel.textContent = '核准人員 E-Mail (必填)';
            cosignerInput.required = true;
            
            passwordGroup.classList.remove('hidden'); 
            passwordInput.required = true;
            
            reasonLabel.textContent = '點收/核准備註 (選填)';
            reasonInput.placeholder = '核准或點收狀況說明...';
            reasonInput.required = false;
        }
        else if (this.value === '維修取回') {
            statusGroup.classList.add('hidden');
            locationGroup.classList.remove('hidden'); 
            
            notifyGroup.classList.remove('hidden'); 
            notifyLabel.textContent = '管理員/通知人員 E-Mail (必填)'; 
            notifyEmailsInput.required = true;
            
            reasonLabel.textContent = '備註 (選填)';
            reasonInput.placeholder = '有什麼需要特別說明的嗎？(選填)';
            reasonInput.required = false;
        } 
        else if (this.value === '報修') {
            statusGroup.classList.add('hidden');
            locationGroup.classList.add('hidden');    
            
            notifyGroup.classList.remove('hidden'); 
            notifyLabel.textContent = '維修負責人/通知人員 E-Mail (必填)'; 
            notifyEmailsInput.required = true;
            
            reasonLabel.textContent = '故障原因 (必填)';
            reasonInput.placeholder = '請簡述故障狀況...';
            reasonInput.required = true;
        }
        else if (this.value === '送修') {
            statusGroup.classList.add('hidden');
            locationGroup.classList.add('hidden');    
            
            notifyGroup.classList.remove('hidden'); 
            notifyLabel.textContent = '相關同仁/通知人員 E-Mail (必填)'; 
            notifyEmailsInput.required = true; 
            
            reasonLabel.textContent = '維修廠商 (必填)'; 
            reasonInput.placeholder = '請輸入維修廠商名稱...';
            reasonInput.required = true;
        }
        
        renderCategories(); 
    });

    equipSelect.addEventListener('change', validateFormSubmitState);

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        passwordError.classList.add('hidden');

        if (actionSelect.value === '二次加簽') {
            const ADMIN_PASSWORD = "8888"; 
            if (passwordInput.value !== ADMIN_PASSWORD) {
                passwordError.classList.remove('hidden');
                return; 
            }
        }
        
        submitBtn.disabled = true;
        document.getElementById('submitLoading').style.display = 'block';
        localStorage.setItem('savedEmail', userEmailInput.value);

        const sendData = {
            userEmail: userEmailInput.value,
            equipId: equipSelect.value,
            action: actionSelect.value,
            currentStatus: document.getElementById('currentStatus').value,
            currentLocation: document.getElementById('currentLocation').value,
            reason: reasonInput.value,
            cosigner: cosignerInput.value,
            notifyEmails: notifyEmailsInput.value,
            period: periodGroup.classList.contains('hidden') ? "" : periodSelect.value 
        };

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(sendData),
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' }
        }).then(() => {
            alert(sendData.action + " 紀錄已成功送出！並已發送信件給相關人員。");
            window.location.reload(); 
        }).catch(err => {
            alert("傳送失敗");
            submitBtn.disabled = false;
            document.getElementById('submitLoading').style.display = 'none';
        });
    });
</script>
</body>
</html>
